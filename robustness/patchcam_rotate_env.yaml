# PatchCamelyon rotation override (Type 1): rotation applied to train/val/test.
# Env vars:
#   ROTATE_ANGLES: e.g. "[90,180,270]"   (optional, default below)
#   ROTATE_P:      e.g. "1.0"            (optional, default 1.0)
# Preprocessing env vars:
#   NORMALIZE_MEAN, NORMALIZE_STD, RESIZE_DIM

data:
  init_args:
    datasets:
      predict:
        - class_path: eva.vision.datasets.PatchCamelyon
          init_args:
            root: ${oc.env:DATA_ROOT}
            split: train
            download: ${oc.env:DOWNLOAD_DATA, false}
            transforms:
              class_path: torchvision.transforms.v2.Compose
              init_args:
                transforms:
                  - class_path: torchvision.transforms.v2.ToImage
                  - class_path: torchvision.transforms.v2.Resize
                    init_args:
                      size: ${oc.env:RESIZE_DIM, 224}
                  - class_path: robustness.transforms.rotation.RandomRotate90
                    init_args:
                      angles: ${oc.decode:${oc.env:ROTATE_ANGLES, "[90,180,270]"}}
                      p: ${oc.env:ROTATE_P, 1.0}
                  - class_path: torchvision.transforms.v2.ToDtype
                    init_args:
                      dtype: torch.float32
                      scale: true
                  - class_path: torchvision.transforms.v2.Normalize
                    init_args:
                      mean: ${oc.decode:${oc.env:NORMALIZE_MEAN}}
                      std:  ${oc.decode:${oc.env:NORMALIZE_STD}}

        - class_path: eva.vision.datasets.PatchCamelyon
          init_args:
            root: ${oc.env:DATA_ROOT}
            split: val
            download: ${oc.env:DOWNLOAD_DATA, false}
            transforms:
              class_path: torchvision.transforms.v2.Compose
              init_args:
                transforms:
                  - class_path: torchvision.transforms.v2.ToImage
                  - class_path: torchvision.transforms.v2.Resize
                    init_args:
                      size: ${oc.env:RESIZE_DIM, 224}
                  - class_path: robustness.transforms.rotation.RandomRotate90
                    init_args:
                      angles: ${oc.decode:${oc.env:ROTATE_ANGLES, "[90,180,270]"}}
                      p: ${oc.env:ROTATE_P, 1.0}
                  - class_path: torchvision.transforms.v2.ToDtype
                    init_args:
                      dtype: torch.float32
                      scale: true
                  - class_path: torchvision.transforms.v2.Normalize
                    init_args:
                      mean: ${oc.decode:${oc.env:NORMALIZE_MEAN}}
                      std:  ${oc.decode:${oc.env:NORMALIZE_STD}}

        - class_path: eva.vision.datasets.PatchCamelyon
          init_args:
            root: ${oc.env:DATA_ROOT}
            split: test
            download: ${oc.env:DOWNLOAD_DATA, false}
            transforms:
              class_path: torchvision.transforms.v2.Compose
              init_args:
                transforms:
                  - class_path: torchvision.transforms.v2.ToImage
                  - class_path: torchvision.transforms.v2.Resize
                    init_args:
                      size: ${oc.env:RESIZE_DIM, 224}
                  - class_path: robustness.transforms.rotation.RandomRotate90
                    init_args:
                      angles: ${oc.decode:${oc.env:ROTATE_ANGLES, "[90,180,270]"}}
                      p: ${oc.env:ROTATE_P, 1.0}
                  - class_path: torchvision.transforms.v2.ToDtype
                    init_args:
                      dtype: torch.float32
                      scale: true
                  - class_path: torchvision.transforms.v2.Normalize
                    init_args:
                      mean: ${oc.decode:${oc.env:NORMALIZE_MEAN}}
                      std:  ${oc.decode:${oc.env:NORMALIZE_STD}}
