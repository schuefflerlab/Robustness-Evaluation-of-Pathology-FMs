# Generic PatchCamelyon blur override (Type 1): blur applied to train/val/test.
# Blur params are taken from environment variables:
#   BLUR_KERNEL (int), BLUR_SIGMA (float)
# Preprocessing is taken from environment variables:
#   NORMALIZE_MEAN, NORMALIZE_STD, RESIZE_DIM

data:
  init_args:
    datasets:
      predict:
        - class_path: eva.vision.datasets.PatchCamelyon
          init_args:
            root: ${oc.env:DATA_ROOT}
            split: train
            download: ${oc.env:DOWNLOAD_DATA, false}
            transforms:
              class_path: torchvision.transforms.v2.Compose
              init_args:
                transforms:
                  - class_path: torchvision.transforms.v2.ToImage
                  - class_path: torchvision.transforms.v2.Resize
                    init_args:
                      size: ${oc.env:RESIZE_DIM, 224}
                  - class_path: torchvision.transforms.v2.GaussianBlur
                    init_args:
                      kernel_size: ${oc.env:BLUR_KERNEL}
                      sigma: ${oc.env:BLUR_SIGMA}
                  - class_path: torchvision.transforms.v2.ToDtype
                    init_args:
                      dtype: torch.float32
                      scale: true
                  - class_path: torchvision.transforms.v2.Normalize
                    init_args:
                      mean: ${oc.env:NORMALIZE_MEAN}
                      std:  ${oc.env:NORMALIZE_STD}

        - class_path: eva.vision.datasets.PatchCamelyon
          init_args:
            root: ${oc.env:DATA_ROOT}
            split: val
            download: ${oc.env:DOWNLOAD_DATA, false}
            transforms:
              class_path: torchvision.transforms.v2.Compose
              init_args:
                transforms:
                  - class_path: torchvision.transforms.v2.ToImage
                  - class_path: torchvision.transforms.v2.Resize
                    init_args:
                      size: ${oc.env:RESIZE_DIM, 224}
                  - class_path: torchvision.transforms.v2.GaussianBlur
                    init_args:
                      kernel_size: ${oc.env:BLUR_KERNEL}
                      sigma: ${oc.env:BLUR_SIGMA}
                  - class_path: torchvision.transforms.v2.ToDtype
                    init_args:
                      dtype: torch.float32
                      scale: true
                  - class_path: torchvision.transforms.v2.Normalize
                    init_args:
                      mean: ${oc.env:NORMALIZE_MEAN}
                      std:  ${oc.env:NORMALIZE_STD}

        - class_path: eva.vision.datasets.PatchCamelyon
          init_args:
            root: ${oc.env:DATA_ROOT}
            split: test
            download: ${oc.env:DOWNLOAD_DATA, false}
            transforms:
              class_path: torchvision.transforms.v2.Compose
              init_args:
                transforms:
                  - class_path: torchvision.transforms.v2.ToImage
                  - class_path: torchvision.transforms.v2.Resize
                    init_args:
                      size: ${oc.env:RESIZE_DIM, 224}
                  - class_path: torchvision.transforms.v2.GaussianBlur
                    init_args:
                      kernel_size: ${oc.env:BLUR_KERNEL}
                      sigma: ${oc.env:BLUR_SIGMA}
                  - class_path: torchvision.transforms.v2.ToDtype
                    init_args:
                      dtype: torch.float32
                      scale: true
                  - class_path: torchvision.transforms.v2.Normalize
                    init_args:
                      mean: ${oc.env:NORMALIZE_MEAN}
                      std:  ${oc.env:NORMALIZE_STD}